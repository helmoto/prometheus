apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "prometheus-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "prometheus-agent.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.config.globalScrapeInterval }}
      scrape_timeout: {{ .Values.config.globalScrapeTimeout }}
      evaluation_interval: {{ .Values.config.evaluationInterval }}

    remote_write:
      - url: {{- .Values.config.remote }}
        basic_auth:
          username: {{- .Values.config.basic.username }}
          password: {{- .Values.config.basic.password }}

    scrape_configs:
      {{- toYaml .Values.config.scrape | nindent 6 }}
