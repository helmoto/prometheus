{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "prometheus-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "prometheus-agent.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "prometheus-agent.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    ## Allow scraping of the agent's own metrics
    - ports:
        - port: 9090
  egress:
    ## Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    ## Allow reaching scrape targets and remote_write endpoints
    - ports:
        - port: 443
        - port: 80
        - port: 9090
        - port: 9091
{{- end }}
