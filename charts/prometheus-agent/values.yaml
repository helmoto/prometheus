# Default values for prometheus-agent.
# Override these in your environment-specific values files.

## -- Number of replicas (use 2+ for HA in agent mode)
replicaCount: 1

image:
  repository: prom/prometheus
  tag: ""  # Defaults to Chart appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

## -- Prometheus agent configuration
## Ref: https://prometheus.io/docs/prometheus/latest/configuration/configuration/
config:
  ## -- Scrape interval (global default)
  globalScrapeInterval: 60s
  globalScrapeTimeout: 10s
  evaluationInterval: 60s

  ## -- Remote write configuration (required in agent mode)
  remoteWrite:
    - url: "http://prometheus-remote-write:9090/api/v1/write"
      # queueConfig:
      #   maxSamplesPerSend: 10000
      #   maxShards: 200
      #   capacity: 2500
      # tlsConfig:
      #   insecureSkipVerify: false
      # basicAuth:
      #   username:
      #     name: remote-write-secret
      #     key: username
      #   password:
      #     name: remote-write-secret
      #     key: password

  ## -- Scrape configs
  scrapeConfigs:
    - job_name: "kubernetes-apiservers"
      kubernetes_sd_configs:
        - role: endpoints
      scheme: https
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      relabel_configs:
        - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
          action: keep
          regex: default;kubernetes;https

    - job_name: "kubernetes-nodes"
      scheme: https
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      kubernetes_sd_configs:
        - role: node
      relabel_configs:
        - action: labelmap
          regex: __meta_kubernetes_node_label_(.+)

    - job_name: "kubernetes-pods"
      kubernetes_sd_configs:
        - role: pod
      relabel_configs:
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
          action: keep
          regex: "true"
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
          action: replace
          regex: ([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
          target_label: __address__
        - action: labelmap
          regex: __meta_kubernetes_pod_label_(.+)
        - source_labels: [__meta_kubernetes_namespace]
          action: replace
          target_label: kubernetes_namespace
        - source_labels: [__meta_kubernetes_pod_name]
          action: replace
          target_label: kubernetes_pod_name

    - job_name: "kubernetes-service-endpoints"
      kubernetes_sd_configs:
        - role: endpoints
      relabel_configs:
        - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
          action: keep
          regex: "true"
        - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
          action: replace
          regex: ([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
          target_label: __address__
        - action: labelmap
          regex: __meta_kubernetes_service_label_(.+)
        - source_labels: [__meta_kubernetes_namespace]
          action: replace
          target_label: kubernetes_namespace
        - source_labels: [__meta_kubernetes_service_name]
          action: replace
          target_label: kubernetes_name

## -- ServiceAccount
serviceAccount:
  create: true
  annotations: {}
  name: ""

## -- RBAC
rbac:
  create: true

## -- Pod-level security context
podSecurityContext:
  fsGroup: 65534
  runAsGroup: 65534
  runAsNonRoot: true
  runAsUser: 65534

## -- Container-level security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

## -- Service
service:
  type: ClusterIP
  port: 9090
  annotations: {}

## -- Resources
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

## -- Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /-/healthy
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /-/ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3

## -- Storage (WAL for agent mode)
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  annotations: {}

## -- Extra volumes and mounts (e.g. for TLS certs)
extraVolumes: []
extraVolumeMounts: []

## -- Extra environment variables
extraEnv: []
# - name: MY_VAR
#   value: "my-value"

## -- Extra args passed to the prometheus binary
extraArgs: []
# - "--log.level=debug"

## -- Node selector, tolerations, affinity
nodeSelector: {}
tolerations: []
affinity: {}

## -- Pod annotations
podAnnotations: {}

## -- Pod labels
podLabels: {}

## -- Priority class
priorityClassName: ""

## -- Topology spread constraints
topologySpreadConstraints: []

## -- HPA (useful with agent mode sharding)
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

## -- PodDisruptionBudget
podDisruptionBudget:
  enabled: false
  minAvailable: 1

## -- NetworkPolicy
networkPolicy:
  enabled: false

## -- ServiceMonitor (if prometheus-operator is present)
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
